<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whisper Voice Typing</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: transparent;
      overflow: hidden;
      -webkit-app-region: drag;
    }

    .container {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 40px;
      padding: 20px 30px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      display: flex;
      align-items: center;
      gap: 15px;
      -webkit-app-region: no-drag;
    }

    .status-indicator {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #4ade80;
      animation: pulse 2s infinite;
    }

    .status-indicator.recording {
      background: #ef4444;
      animation: pulse 1s infinite;
    }

    .status-indicator.processing {
      background: #fbbf24;
      animation: spin 1s linear infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.5;
      }
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }

    .message {
      color: white;
      font-size: 14px;
      font-weight: 500;
      flex: 1;
    }

    .close-btn {
      background: rgba(255, 255, 255, 0.2);
      border: none;
      color: white;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: background 0.2s;
    }

    .close-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .transcript {
      margin-top: 10px;
      padding: 10px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: white;
      font-size: 12px;
      max-height: 100px;
      overflow-y: auto;
    }

    .error {
      color: #fee;
      background: rgba(239, 68, 68, 0.2);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="status-indicator" id="status"></div>
    <div class="message" id="message">Press Ctrl+Shift+V to start</div>
    <button class="close-btn" id="closeBtn">×</button>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    const statusIndicator = document.getElementById('status');
    const message = document.getElementById('message');
    const closeBtn = document.getElementById('closeBtn');

    // Update UI based on recording state
    ipcRenderer.on('recording-started', () => {
      statusIndicator.className = 'status-indicator recording';
      message.textContent = 'Recording... (Press Ctrl+Shift+V to stop)';
    });

    ipcRenderer.on('recording-stopped', () => {
      statusIndicator.className = 'status-indicator';
      message.textContent = 'Processing...';
    });

    ipcRenderer.on('processing', () => {
      statusIndicator.className = 'status-indicator processing';
      message.textContent = 'Transcribing with Whisper...';
    });

    ipcRenderer.on('transcription-ready', (event, text) => {
      statusIndicator.className = 'status-indicator';
      message.textContent = `✓ Typed: "${text.substring(0, 50)}${text.length > 50 ? '...' : ''}"`;
    });

    ipcRenderer.on('error', (event, errorMsg) => {
      statusIndicator.className = 'status-indicator';
      message.textContent = `✗ ${errorMsg}`;
      message.className = 'message error';

      // Reset after 3 seconds
      setTimeout(() => {
        message.className = 'message';
        message.textContent = 'Press Ctrl+Shift+V to start';
      }, 3000);
    });

    // Close button
    closeBtn.addEventListener('click', () => {
      ipcRenderer.send('hide-window');
    });
  </script>
</body>
</html>
